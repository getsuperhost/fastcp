services:
  fastcp:
    build: .
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      - IS_DEBUG=1
      - DJANGO_SETTINGS_MODULE=fastcp.settings
      - SECRET_KEY=django-insecure-docker-key-change-in-production
    volumes:
      # Mount source code for development hot reloading
      - .:/app
      # Mount the database file for persistence
      - ./db.sqlite3:/app/db.sqlite3
      # Mount logs directory
      - ./logs:/app/logs
      # Mount tmp directory
      - ./tmp:/app/tmp
      # Mount static files
      - ./staticfiles:/app/staticfiles
    networks:
      - fastcp-network
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8899
    healthcheck:
      test: ["CMD", "python", "manage.py", "check", "--deploy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fastcp-network:
    driver: bridge
