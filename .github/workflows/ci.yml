name: FastCP CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_fastcp
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-libmysqlclient-dev pkg-config

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov black isort flake8 bandit safety

    - name: Install Node.js dependencies
      run: npm install

    - name: Run code quality checks
      run: |
        black --check --diff .
        isort --check-only --diff .
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run security scan
      run: |
        bandit -r . -f json -o security_report.json || true
        safety check --json > safety_report.json || true

    - name: Run Django migrations
      run: |
        python manage.py migrate --noinput
      env:
        DJANGO_SETTINGS_MODULE: fastcp.settings
        IS_DEBUG: 1

    - name: Run tests
      run: |
        python manage.py test --verbosity=2 --keepdb
      env:
        DJANGO_SETTINGS_MODULE: fastcp.settings
        IS_DEBUG: 1

    - name: Build frontend assets
      run: npm run production

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          security_report.json
          safety_report.json

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools-scm b2sdk

    - name: Deploy to CDN
      run: python3 ./update.py
      env:
        B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
        B2_KEY: ${{ secrets.B2_KEY }}
